<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Storyscape | Archive Adaptive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --folder-color: #f2eee3;
            --ink-black: #1a1a1a;
            --paper-texture: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #d9d4c7; /* 深色桌面底色 */
            font-family: 'Space Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 适配 iPhone 底部的小黑条 */
            padding-bottom: env(safe-area-inset-bottom); 
            box-sizing: border-box;
        }

        /* 修复后的自适应文件夹容器 */
        .folder-container {
            position: relative;
            width: 90%; /* 左右留白，防止贴边 */
            max-width: 380px; /* 大屏手机上的最大宽度限制 */
            
            /* 关键修复：从固定 px 改为相对屏幕高度的 vh */
            height: 85vh; /* 占据屏幕高度的 85%，确保上下有呼吸空间 */
            max-height: 680px; /* 防止在极高的屏幕上过度拉伸 */
            
            background-color: var(--folder-color);
            background-image: var(--paper-texture);
            border-radius: 0 20px 20px 20px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.15);
            
            /* 使用 Flex 布局让内部元素自适应 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* 按钮始终贴到底部 */
            padding: 30px 20px; /* 内部留白 */
            box-sizing: border-box;
            
            transition: height 0.3s ease; /* 增加一点平滑过渡 */
        }

        /* 左侧 Tab */
        .folder-tab {
            position: absolute;
            left: -35px;
            top: 40px;
            width: 35px;
            height: 140px;
            background-color: var(--folder-color);
            background-image: var(--paper-texture);
            border-radius: 12px 0 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: -5px 5px 15px rgba(0,0,0,0.05);
        }

        .tab-text {
            transform: rotate(-90deg);
            white-space: nowrap;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--ink-black);
            text-transform: uppercase;
        }

        /* 适配后的 Camera Frame */
        #camera-frame {
            width: 100%;
            /* 保持 3:3 比例，但在 Flex 布局下，它会优先占据剩余空间 */
            aspect-ratio: 3 / 4; 
            background: #e0ddd3;
            border: 1px solid rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            
            flex-grow: 1; /* 重要：让摄像头窗口自动填满剩余高度 */
            margin-bottom: 20px; /* 与下方按钮的间距 */
        }

        #camera-feed {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 按钮在 Flex 下位置固定 */
        .find-btn {
            background-color: var(--ink-black);
            color: #ffffff;
            border: none;
            padding: 16px 45px; /* 稍微加大一点点击区域，利于触屏 */
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            flex-shrink: 0; /* 防止按钮被压缩 */
            margin-bottom: 10px;
        }

        .find-btn:active {
            opacity: 0.8;
        }

        /* 隐藏的状态信息，防止抢占空间 */
        #status-info { display: none; }

        /* 加载遮罩 (同样需要自适应) */
        #loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--folder-color);
            background-image: var(--paper-texture);
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 0 20px 20px 20px;
        }

        .spinner {
            width: 30px; height: 30px;
            border: 2px solid var(--ink-black);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s infinite linear;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="folder-container">
        <div class="folder-tab">
            <div class="tab-text">Storyscape</div>
        </div>

        <div id="camera-frame">
            <video id="camera-feed" autoplay playsinline></video>
        </div>

        <button class="find-btn" onclick="startSearch()">Find Archive</button>

        <div id="status-info">Signal Ready.</div>

        <div id="loading-overlay">
            <div class="spinner"></div>
            <p style="margin-top: 20px; font-size: 11px;">Locking Echo Coordinates...</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-feed');

        // 启动摄像头
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { video.srcObject = stream; })
            .catch(() => {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => { video.srcObject = stream; });
            });

        function startSearch() {
            document.getElementById('loading-overlay').style.display = 'flex';
            
            // 模拟搜索，Page 2 的 Tabs 逻辑可以在这里触发
            setTimeout(() => {
                // 暂时用 Alert 代替跳转
                alert("Archive Found. Loading selection tabs...");
                document.getElementById('loading-overlay').style.display = 'none';
                // 后面我们会在这里添加 Page 2 的代码
            }, 1800);
        }
    </script>
</body>
</html>
